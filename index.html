<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>新房装修灵感板 | 自动压缩 + 大容量存储</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #F8F4EE;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #3E2C23;
            padding: 1rem;
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #B87C4E, #9B5E2E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0 0.5rem;
        }
        .btn {
            background: #E2D3C4;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: #5A3E28;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #B87C4E;
            color: white;
        }
        .btn-primary:hover {
            background: #9B5E2E;
        }
        .btn:hover {
            background: #CFBCA8;
        }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.8rem;
        }
        .room-card {
            background: #FFFFFFF2;
            border-radius: 1.8rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #F2E3D4;
            display: flex;
            flex-direction: column;
        }
        .room-header {
            background: #FEF3E9;
            padding: 0.8rem 1.2rem;
            border-bottom: 2px solid #F5E2D0;
        }
        .room-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #7C5134;
        }
        .global-note-area {
            padding: 0.8rem 1rem;
            background: #FEFAF5;
        }
        .global-note-area label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #A27248;
            display: block;
            margin-bottom: 5px;
        }
        .global-note-input {
            width: 100%;
            border: 1px solid #EDDCCE;
            border-radius: 1rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
            font-family: inherit;
            background: white;
            resize: vertical;
        }
        .global-note-input:focus {
            outline: none;
            border-color: #C28962;
            box-shadow: 0 0 0 2px #F0DBCA;
        }
        .images-wall {
            padding: 0.8rem 1rem 1rem;
            flex: 1;
        }
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .image-item {
            background: #FFF9F3;
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid #F2E0D0;
        }
        .image-preview {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #F0E4D8;
            display: block;
        }
        .image-note {
            padding: 0.5rem;
        }
        .note-input {
            width: 100%;
            border: 1px solid #EFDDCD;
            border-radius: 1rem;
            padding: 0.4rem 0.6rem;
            font-size: 0.75rem;
            font-family: inherit;
            background: #FFFDF9;
            resize: vertical;
        }
        .note-input:focus {
            outline: none;
            border-color: #CB9E77;
        }
        .del-img-btn {
            display: block;
            background: #F3E3D6;
            border: none;
            width: 100%;
            padding: 0.4rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #B35F2E;
            cursor: pointer;
            transition: 0.1s;
            border-top: 1px solid #F2E0D0;
        }
        .del-img-btn:hover {
            background: #FADEC4;
        }
        .add-img-btn {
            background: #F8EFE6;
            border: 1px dashed #D6BEAA;
            border-radius: 2rem;
            padding: 0.6rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            color: #AA7A53;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.4rem;
        }
        .add-img-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #EADCCF;
        }
        .add-img-btn:hover:not(.disabled) {
            background: #EDDFD1;
            border-color: #C29A74;
        }
        .count-tip {
            font-size: 0.7rem;
            color: #B2845C;
            margin-top: 6px;
            text-align: right;
        }
        .empty-tip {
            text-align: center;
            color: #CBB49C;
            font-size: 0.8rem;
            padding: 1rem;
            font-style: italic;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #B9987A;
            border-top: 1px solid #EDDECE;
            padding-top: 1rem;
        }
        @media (max-width: 780px) {
            body { padding: 0.6rem; }
            .rooms-grid { grid-template-columns: 1fr; }
        }
        .sync-note {
            background: #FFF2E4;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 0.5rem;
        }
        .loading-mask {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }
        .loading-spinner {
            background: white;
            padding: 1.2rem 2rem;
            border-radius: 2rem;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-home"></i> 我家装修 · 灵感集（大容量+自动压缩）</h1>
        <p>自动压缩图片至 ~300KB | IndexedDB 可存数百张 | 支持导入导出备份</p>
        <div class="toolbar">
            <button id="exportDataBtn" class="btn"><i class="fas fa-download"></i> 导出数据 (.json)</button>
            <button id="importDataBtn" class="btn"><i class="fas fa-upload"></i> 导入数据</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
            <button id="resetAllData" class="btn"><i class="fas fa-trash-alt"></i> 重置全部</button>
        </div>
        <div class="sync-note"><i class="fas fa-database"></i> 图片自动压缩后存储，容量轻松支持 300+ 张。导出后可迁移至其他设备。</div>
    </div>

    <div id="roomsContainer" class="rooms-grid"></div>
    <footer>✨ 每张图片上传时自动压缩至 1200px 宽/高以内，质量 0.7，显著节省空间。文本框实时保存。</footer>
</div>

<script>
    // ---------- 空间列表 ----------
    const ROOMS = [
        { id: "entry", name: "玄关", icon: "fa-door-open" },
        { id: "bath1", name: "卫生间1", icon: "fa-toilet" },
        { id: "kitchen", name: "厨房", icon: "fa-utensils" },
        { id: "living", name: "客厅", icon: "fa-couch" },
        { id: "dining", name: "餐厅", icon: "fa-utensil-spoon" },
        { id: "balcony", name: "阳台", icon: "fa-sun" },
        { id: "studyCloset", name: "书房衣帽间", icon: "fa-archive" },
        { id: "bedroom", name: "卧室", icon: "fa-bed" },
        { id: "bath2", name: "卫生间2", icon: "fa-shower" }
    ];

    const MAX_IMAGES_PER_ROOM = 100;   // 每个空间上限100张，总体可容纳900张，远超需求
    const COMPRESS_MAX_WIDTH = 1200;
    const COMPRESS_QUALITY = 0.7;
    const DB_NAME = 'HomeRenovationDB';
    const DB_VERSION = 2; // 升级版本，确保使用新结构
    const STORE_NAME = 'roomData';

    let db = null;
    let currentObjectUrls = [];

    // 初始化 IndexedDB
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbRef = event.target.result;
                if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                    dbRef.createObjectStore(STORE_NAME, { keyPath: 'roomId' });
                }
            };
        });
    }

    // 加载房间数据
    async function loadRoomData(roomId) {
        if (!db) await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const getReq = store.get(roomId);
            getReq.onsuccess = () => {
                const result = getReq.result;
                if (result) {
                    resolve({ globalNote: result.globalNote || '', images: result.images || [] });
                } else {
                    resolve({ globalNote: '', images: [] });
                }
            };
            getReq.onerror = () => reject(getReq.error);
        });
    }

    // 保存房间数据
    async function saveRoomData(roomId, globalNote, imagesArray) {
        if (!db) await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const data = { roomId, globalNote, images: imagesArray };
            const putReq = store.put(data);
            putReq.onsuccess = () => resolve();
            putReq.onerror = () => reject(putReq.error);
        });
    }

    async function updateGlobalNote(roomId, note) {
        const { globalNote, images } = await loadRoomData(roomId);
        await saveRoomData(roomId, note, images);
    }

    // 压缩图片并返回 Blob
    async function compressImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    let newWidth, newHeight;
                    if (width > height) {
                        if (width > COMPRESS_MAX_WIDTH) {
                            newWidth = COMPRESS_MAX_WIDTH;
                            newHeight = (height * COMPRESS_MAX_WIDTH) / width;
                        } else {
                            newWidth = width;
                            newHeight = height;
                        }
                    } else {
                        if (height > COMPRESS_MAX_WIDTH) {
                            newHeight = COMPRESS_MAX_WIDTH;
                            newWidth = (width * COMPRESS_MAX_WIDTH) / height;
                        } else {
                            newWidth = width;
                            newHeight = height;
                        }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = newWidth;
                    canvas.height = newHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, newWidth, newHeight);
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, file.type || 'image/jpeg', COMPRESS_QUALITY);
                };
                img.onerror = () => reject(new Error('图片加载失败'));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(file);
        });
    }

    // 添加图片（自动压缩）
    async function addImageToRoom(roomId, file) {
        if (!file.type.startsWith('image/')) {
            alert("请选择图片文件");
            return false;
        }
        const { globalNote, images } = await loadRoomData(roomId);
        if (images.length >= MAX_IMAGES_PER_ROOM) {
            alert(`每个空间最多 ${MAX_IMAGES_PER_ROOM} 张图片，已达上限。`);
            return false;
        }
        // 压缩图片
        let compressedBlob;
        try {
            compressedBlob = await compressImage(file);
        } catch (err) {
            alert("图片压缩失败，请重试。");
            return false;
        }
        const imageId = Date.now() + '-' + Math.random().toString(36).substring(2, 10);
        const newImage = {
            id: imageId,
            blob: compressedBlob,
            note: "",
            mimeType: compressedBlob.type
        };
        images.push(newImage);
        await saveRoomData(roomId, globalNote, images);
        return true;
    }

    async function deleteImage(roomId, imageId) {
        const { globalNote, images } = await loadRoomData(roomId);
        const newImages = images.filter(img => img.id !== imageId);
        await saveRoomData(roomId, globalNote, newImages);
    }

    async function updateImageNote(roomId, imageId, newNote) {
        const { globalNote, images } = await loadRoomData(roomId);
        const img = images.find(img => img.id === imageId);
        if (img) {
            img.note = newNote;
            await saveRoomData(roomId, globalNote, images);
        }
    }

    async function resetAllData() {
        if (!confirm("⚠️ 确定要清空所有空间里的图片和备注吗？此操作不可撤销。")) return;
        if (!db) await initDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const clearReq = store.clear();
        clearReq.onsuccess = () => fullRender();
        clearReq.onerror = () => alert("清空失败");
    }

    function revokeAllObjectURLs() {
        currentObjectUrls.forEach(url => URL.revokeObjectURL(url));
        currentObjectUrls = [];
    }

    function createBlobURL(blob) {
        const url = URL.createObjectURL(blob);
        currentObjectUrls.push(url);
        return url;
    }

    // 局部刷新某个房间的图片网格
    async function refreshImagesGrid(roomId) {
        const roomCard = document.querySelector(`.room-card[data-room-id="${roomId}"]`);
        if (!roomCard) return;
        const imagesWall = roomCard.querySelector('.images-wall');
        if (!imagesWall) return;
        const { globalNote, images } = await loadRoomData(roomId);
        const imageCount = images.length;
        const canAddMore = imageCount < MAX_IMAGES_PER_ROOM;

        const imagesGrid = imagesWall.querySelector('.images-grid');
        if (imagesGrid) {
            imagesGrid.innerHTML = '';
            if (images.length === 0) {
                const emptyMsg = document.createElement("div");
                emptyMsg.className = "empty-tip";
                emptyMsg.innerText = "📸 暂无图片，点击下方按钮添加设计图/实景照";
                imagesGrid.appendChild(emptyMsg);
            } else {
                for (let img of images) {
                    const imgUrl = createBlobURL(img.blob);
                    const imgItem = document.createElement("div");
                    imgItem.className = "image-item";
                    imgItem.innerHTML = `
                        <img class="image-preview" src="${imgUrl}" alt="装修参考" loading="lazy">
                        <div class="image-note">
                            <textarea class="note-input" rows="2" placeholder="添加备注（如：材质/品牌/避坑点）" data-image-id="${img.id}">${escapeHtml(img.note)}</textarea>
                        </div>
                        <button class="del-img-btn" data-image-id="${img.id}"><i class="fas fa-trash-alt"></i> 删除图片</button>
                    `;
                    imagesGrid.appendChild(imgItem);
                }
            }
        }

        const addBtn = imagesWall.querySelector('.add-img-btn');
        if (addBtn) {
            addBtn.innerHTML = `<i class="fas fa-plus-circle"></i> 添加图片 (${imageCount}/${MAX_IMAGES_PER_ROOM})`;
            if (!canAddMore) {
                addBtn.classList.add("disabled");
                addBtn.disabled = true;
            } else {
                addBtn.classList.remove("disabled");
                addBtn.disabled = false;
            }
        }
        const countTip = imagesWall.querySelector('.count-tip');
        if (countTip) {
            countTip.innerText = canAddMore ? `还可添加 ${MAX_IMAGES_PER_ROOM - imageCount} 张` : `已达上限 ${MAX_IMAGES_PER_ROOM} 张`;
        }

        attachImageEvents(roomId, imagesWall);
    }

    function attachImageEvents(roomId, wallContainer) {
        const noteTextareas = wallContainer.querySelectorAll('.note-input');
        noteTextareas.forEach(textarea => {
            const imageId = textarea.getAttribute('data-image-id');
            textarea.removeEventListener('input', textarea._inputHandler);
            const handler = (e) => {
                updateImageNote(roomId, imageId, e.target.value);
            };
            textarea.addEventListener('input', handler);
            textarea._inputHandler = handler;
        });

        const delBtns = wallContainer.querySelectorAll('.del-img-btn');
        delBtns.forEach(btn => {
            const imageId = btn.getAttribute('data-image-id');
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                e.stopPropagation();
                if (confirm("确定删除这张图片吗？")) {
                    await deleteImage(roomId, imageId);
                    await refreshImagesGrid(roomId);
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
    }

    // 全量渲染所有房间
    async function fullRender() {
        revokeAllObjectURLs();
        const container = document.getElementById("roomsContainer");
        if (!container) return;
        container.innerHTML = '';
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading-mask';
        loadingDiv.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>';
        document.body.appendChild(loadingDiv);

        try {
            for (let room of ROOMS) {
                const roomId = room.id;
                const { globalNote, images } = await loadRoomData(roomId);
                const imageCount = images.length;
                const canAddMore = imageCount < MAX_IMAGES_PER_ROOM;

                const card = document.createElement("div");
                card.className = "room-card";
                card.setAttribute("data-room-id", roomId);

                // 头部
                const headerDiv = document.createElement("div");
                headerDiv.className = "room-header";
                headerDiv.innerHTML = `
                    <div class="room-title">
                        <i class="fas ${room.icon}"></i>
                        <span>${room.name}</span>
                    </div>
                `;
                card.appendChild(headerDiv);

                // 全局备注
                const globalDiv = document.createElement("div");
                globalDiv.className = "global-note-area";
                const label = document.createElement("label");
                label.innerHTML = '<i class="fas fa-pen-fancy"></i> 空间笔记 / 灵感备注';
                const textareaGlobal = document.createElement("textarea");
                textareaGlobal.className = "global-note-input";
                textareaGlobal.rows = 2;
                textareaGlobal.placeholder = "写点装修想法、配色方案、选材提醒...";
                textareaGlobal.value = globalNote;
                globalDiv.appendChild(label);
                globalDiv.appendChild(textareaGlobal);
                card.appendChild(globalDiv);

                // 图片墙
                const wallDiv = document.createElement("div");
                wallDiv.className = "images-wall";

                const imagesGrid = document.createElement("div");
                imagesGrid.className = "images-grid";
                if (images.length === 0) {
                    const emptyMsg = document.createElement("div");
                    emptyMsg.className = "empty-tip";
                    emptyMsg.innerText = "📸 暂无图片，点击下方按钮添加设计图/实景照";
                    imagesGrid.appendChild(emptyMsg);
                } else {
                    for (let img of images) {
                        const imgUrl = createBlobURL(img.blob);
                        const imgItem = document.createElement("div");
                        imgItem.className = "image-item";
                        imgItem.innerHTML = `
                            <img class="image-preview" src="${imgUrl}" alt="装修参考" loading="lazy">
                            <div class="image-note">
                                <textarea class="note-input" rows="2" placeholder="添加备注（如：材质/品牌/避坑点）" data-image-id="${img.id}">${escapeHtml(img.note)}</textarea>
                            </div>
                            <button class="del-img-btn" data-image-id="${img.id}"><i class="fas fa-trash-alt"></i> 删除图片</button>
                        `;
                        imagesGrid.appendChild(imgItem);
                    }
                }
                wallDiv.appendChild(imagesGrid);

                const addBtn = document.createElement("button");
                addBtn.className = "add-img-btn";
                if (!canAddMore) addBtn.classList.add("disabled");
                addBtn.innerHTML = `<i class="fas fa-plus-circle"></i> 添加图片 (${imageCount}/${MAX_IMAGES_PER_ROOM})`;
                if (!canAddMore) addBtn.disabled = true;

                const countTip = document.createElement("div");
                countTip.className = "count-tip";
                countTip.innerText = canAddMore ? `还可添加 ${MAX_IMAGES_PER_ROOM - imageCount} 张` : `已达上限 ${MAX_IMAGES_PER_ROOM} 张`;

                const fileInput = document.createElement("input");
                fileInput.type = "file";
                fileInput.accept = "image/*";
                fileInput.style.display = "none";

                wallDiv.appendChild(addBtn);
                wallDiv.appendChild(countTip);
                wallDiv.appendChild(fileInput);
                card.appendChild(wallDiv);
                container.appendChild(card);

                // 全局备注保存
                textareaGlobal.addEventListener("input", async (e) => {
                    await updateGlobalNote(roomId, e.target.value);
                });

                if (canAddMore) {
                    addBtn.addEventListener("click", () => fileInput.click());
                    fileInput.addEventListener("change", async (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const success = await addImageToRoom(roomId, file);
                            if (success) {
                                await refreshImagesGrid(roomId);
                            }
                            fileInput.value = '';
                        }
                    });
                }

                attachImageEvents(roomId, wallDiv);
            }
        } finally {
            loadingDiv.remove();
        }
    }

    // ---------------- 导入导出（压缩后的blob转为base64） ----------------
    async function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    }

    async function exportData() {
        if (!db) await initDB();
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const allRecords = await new Promise((resolve, reject) => {
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
        const exportData = [];
        for (let record of allRecords) {
            const roomExport = {
                roomId: record.roomId,
                globalNote: record.globalNote,
                images: []
            };
            for (let img of record.images) {
                const base64 = await blobToBase64(img.blob);
                roomExport.images.push({
                    id: img.id,
                    note: img.note,
                    mimeType: img.mimeType,
                    base64: base64
                });
            }
            exportData.push(roomExport);
        }
        const jsonStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `home_renovation_backup_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    async function importData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (!Array.isArray(imported)) throw new Error();
                if (!db) await initDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                await new Promise((resolve, reject) => {
                    const clearReq = store.clear();
                    clearReq.onsuccess = resolve;
                    clearReq.onerror = reject;
                });
                for (let roomRecord of imported) {
                    const roomId = roomRecord.roomId;
                    const globalNote = roomRecord.globalNote || "";
                    const images = [];
                    for (let img of roomRecord.images) {
                        const base64Data = img.base64;
                        const byteCharacters = atob(base64Data);
                        const byteNumbers = new Array(byteCharacters.length);
                        for (let i = 0; i < byteCharacters.length; i++) {
                            byteNumbers[i] = byteCharacters.charCodeAt(i);
                        }
                        const byteArray = new Uint8Array(byteNumbers);
                        const blob = new Blob([byteArray], { type: img.mimeType });
                        images.push({
                            id: img.id,
                            blob: blob,
                            note: img.note || "",
                            mimeType: img.mimeType
                        });
                    }
                    await saveRoomData(roomId, globalNote, images);
                }
                await fullRender();
                alert("导入成功！");
            } catch(err) {
                alert("导入失败，请选择正确的备份文件。");
            }
        };
        reader.readAsText(file);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.addEventListener('beforeunload', () => revokeAllObjectURLs());

    async function start() {
        await initDB();
        await fullRender();
        document.getElementById("exportDataBtn").addEventListener("click", exportData);
        const importBtn = document.getElementById("importDataBtn");
        const importFile = document.getElementById("importFileInput");
        importBtn.addEventListener("click", () => importFile.click());
        importFile.addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
                importData(e.target.files[0]);
                importFile.value = '';
            }
        });
        document.getElementById("resetAllData").addEventListener("click", resetAllData);
    }

    start().catch(err => console.error("初始化失败", err));
</script>
