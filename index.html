<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>新房装修灵感板 | 稳定输入 + 多设备同步</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #F8F4EE;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #3E2C23;
            padding: 1rem;
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #B87C4E, #9B5E2E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0 0.5rem;
        }
        .btn {
            background: #E2D3C4;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: #5A3E28;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #B87C4E;
            color: white;
        }
        .btn-primary:hover {
            background: #9B5E2E;
        }
        .btn:hover {
            background: #CFBCA8;
        }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.8rem;
        }
        .room-card {
            background: #FFFFFFF2;
            border-radius: 1.8rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #F2E3D4;
            display: flex;
            flex-direction: column;
        }
        .room-header {
            background: #FEF3E9;
            padding: 0.8rem 1.2rem;
            border-bottom: 2px solid #F5E2D0;
        }
        .room-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #7C5134;
        }
        .global-note-area {
            padding: 0.8rem 1rem;
            background: #FEFAF5;
        }
        .global-note-area label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #A27248;
            display: block;
            margin-bottom: 5px;
        }
        .global-note-input {
            width: 100%;
            border: 1px solid #EDDCCE;
            border-radius: 1rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
            font-family: inherit;
            background: white;
            resize: vertical;
        }
        .global-note-input:focus {
            outline: none;
            border-color: #C28962;
            box-shadow: 0 0 0 2px #F0DBCA;
        }
        .images-wall {
            padding: 0.8rem 1rem 1rem;
            flex: 1;
        }
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .image-item {
            background: #FFF9F3;
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid #F2E0D0;
        }
        .image-preview {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #F0E4D8;
            display: block;
        }
        .image-note {
            padding: 0.5rem;
        }
        .note-input {
            width: 100%;
            border: 1px solid #EFDDCD;
            border-radius: 1rem;
            padding: 0.4rem 0.6rem;
            font-size: 0.75rem;
            font-family: inherit;
            background: #FFFDF9;
            resize: vertical;
        }
        .note-input:focus {
            outline: none;
            border-color: #CB9E77;
        }
        .del-img-btn {
            display: block;
            background: #F3E3D6;
            border: none;
            width: 100%;
            padding: 0.4rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #B35F2E;
            cursor: pointer;
            transition: 0.1s;
            border-top: 1px solid #F2E0D0;
        }
        .del-img-btn:hover {
            background: #FADEC4;
        }
        .add-img-btn {
            background: #F8EFE6;
            border: 1px dashed #D6BEAA;
            border-radius: 2rem;
            padding: 0.6rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            color: #AA7A53;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.4rem;
        }
        .add-img-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #EADCCF;
        }
        .add-img-btn:hover:not(.disabled) {
            background: #EDDFD1;
            border-color: #C29A74;
        }
        .count-tip {
            font-size: 0.7rem;
            color: #B2845C;
            margin-top: 6px;
            text-align: right;
        }
        .empty-tip {
            text-align: center;
            color: #CBB49C;
            font-size: 0.8rem;
            padding: 1rem;
            font-style: italic;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #B9987A;
            border-top: 1px solid #EDDECE;
            padding-top: 1rem;
        }
        @media (max-width: 780px) {
            body { padding: 0.6rem; }
            .rooms-grid { grid-template-columns: 1fr; }
        }
        .sync-note {
            background: #FFF2E4;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-home"></i> 我家装修 · 灵感集</h1>
        <p>每个空间可添加最多20张图片 + 文字备注 | 支持导入/导出，多设备手动同步</p>
        <div class="toolbar">
            <button id="exportDataBtn" class="btn"><i class="fas fa-download"></i> 导出数据</button>
            <button id="importDataBtn" class="btn"><i class="fas fa-upload"></i> 导入数据</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
            <button id="resetAllData" class="btn"><i class="fas fa-trash-alt"></i> 重置全部</button>
        </div>
        <div class="sync-note"><i class="fas fa-cloud-upload-alt"></i> 导出备份 → 在另一设备导入，即可同步所有图片与备注</div>
    </div>

    <div id="roomsContainer" class="rooms-grid"></div>
    <footer>✨ 所有数据自动保存在当前浏览器。文本框均稳定可输入，图片支持拖拽/点击上传。</footer>
</div>

<script>
    // ---------- 空间列表 ----------
    const ROOMS = [
        { id: "entry", name: "玄关", icon: "fa-door-open" },
        { id: "bath1", name: "卫生间1", icon: "fa-toilet" },
        { id: "kitchen", name: "厨房", icon: "fa-utensils" },
        { id: "living", name: "客厅", icon: "fa-couch" },
        { id: "dining", name: "餐厅", icon: "fa-utensil-spoon" },
        { id: "balcony", name: "阳台", icon: "fa-sun" },
        { id: "studyCloset", name: "书房衣帽间", icon: "fa-archive" },
        { id: "bedroom", name: "卧室", icon: "fa-bed" },
        { id: "bath2", name: "卫生间2", icon: "fa-shower" }
    ];

    const MAX_IMAGES_PER_ROOM = 20;
    let roomsData = {};

    // 初始化数据结构
    function initDataStruct() {
        const data = {};
        for (let room of ROOMS) {
            data[room.id] = { globalNote: "", images: [] };
        }
        return data;
    }

    // 加载本地存储
    function loadFromLocal() {
        const saved = localStorage.getItem("homeRenovationData");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                for (let room of ROOMS) {
                    if (!parsed[room.id]) parsed[room.id] = { globalNote: "", images: [] };
                    if (!parsed[room.id].images) parsed[room.id].images = [];
                    if (parsed[room.id].images.length > MAX_IMAGES_PER_ROOM) {
                        parsed[room.id].images = parsed[room.id].images.slice(0, MAX_IMAGES_PER_ROOM);
                    }
                    parsed[room.id].images = parsed[room.id].images.map(img => ({ ...img, note: img.note || "" }));
                    if (parsed[room.id].globalNote === undefined) parsed[room.id].globalNote = "";
                }
                roomsData = parsed;
            } catch(e) { roomsData = initDataStruct(); }
        } else {
            roomsData = initDataStruct();
        }
    }

    function persistToLocal() {
        try {
            localStorage.setItem("homeRenovationData", JSON.stringify(roomsData));
        } catch(e) {
            alert("存储空间不足，请删除部分图片后重试。");
        }
    }

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substring(2, 10);
    }

    // ----- 核心操作函数（会同时更新内存、本地存储、UI）-----
    function updateGlobalNote(roomId, note) {
        if (roomsData[roomId]) {
            roomsData[roomId].globalNote = note;
            persistToLocal();
            // 不需要刷新UI，因为文本框本身已经显示新值
        }
    }

    function updateImageNote(roomId, imageId, newNote) {
        const room = roomsData[roomId];
        if (room) {
            const img = room.images.find(img => img.id === imageId);
            if (img) {
                img.note = newNote;
                persistToLocal();
            }
        }
    }

    function deleteImage(roomId, imageId) {
        const room = roomsData[roomId];
        if (room) {
            room.images = room.images.filter(img => img.id !== imageId);
            persistToLocal();
            // 局部刷新图片列表
            refreshImagesGrid(roomId);
        }
    }

    async function addImageToRoom(roomId, file) {
        const room = roomsData[roomId];
        if (!room) return false;
        if (room.images.length >= MAX_IMAGES_PER_ROOM) {
            alert(`每个空间最多 ${MAX_IMAGES_PER_ROOM} 张图片，已达上限。`);
            return false;
        }
        if (!file.type.startsWith('image/')) {
            alert("请选择图片文件");
            return false;
        }
        if (file.size > 2.5 * 1024 * 1024) {
            alert("图片超过2.5MB，请压缩后再上传。");
            return false;
        }
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const newImage = {
                    id: generateId(),
                    src: e.target.result,
                    note: ""
                };
                room.images.push(newImage);
                persistToLocal();
                refreshImagesGrid(roomId);
                resolve(true);
            };
            reader.onerror = () => {
                alert("读取图片失败");
                resolve(false);
            };
            reader.readAsDataURL(file);
        });
    }

    // 局部刷新某个房间的图片网格，保留全局备注框的焦点不变
    function refreshImagesGrid(roomId) {
        const roomCard = document.querySelector(`.room-card[data-room-id="${roomId}"]`);
        if (!roomCard) return;
        const imagesWall = roomCard.querySelector('.images-wall');
        if (!imagesWall) return;
        const room = roomsData[roomId];
        const images = room?.images || [];
        const imageCount = images.length;
        const canAddMore = imageCount < MAX_IMAGES_PER_ROOM;

        // 更新图片网格
        const imagesGrid = imagesWall.querySelector('.images-grid');
        if (imagesGrid) {
            imagesGrid.innerHTML = '';
            if (images.length === 0) {
                const emptyMsg = document.createElement("div");
                emptyMsg.className = "empty-tip";
                emptyMsg.innerText = "📸 暂无图片，点击下方按钮添加设计图/实景照";
                imagesGrid.appendChild(emptyMsg);
            } else {
                images.forEach(img => {
                    const imgItem = document.createElement("div");
                    imgItem.className = "image-item";
                    imgItem.innerHTML = `
                        <img class="image-preview" src="${escapeHtml(img.src)}" alt="装修参考" loading="lazy">
                        <div class="image-note">
                            <textarea class="note-input" rows="2" placeholder="添加备注（如：材质/品牌/避坑点）" data-image-id="${img.id}">${escapeHtml(img.note)}</textarea>
                        </div>
                        <button class="del-img-btn" data-image-id="${img.id}"><i class="fas fa-trash-alt"></i> 删除图片</button>
                    `;
                    imagesGrid.appendChild(imgItem);
                });
            }
        }

        // 更新添加按钮状态
        const addBtn = imagesWall.querySelector('.add-img-btn');
        if (addBtn) {
            addBtn.innerHTML = `<i class="fas fa-plus-circle"></i> 添加图片 (${imageCount}/${MAX_IMAGES_PER_ROOM})`;
            if (!canAddMore) {
                addBtn.classList.add("disabled");
                addBtn.disabled = true;
            } else {
                addBtn.classList.remove("disabled");
                addBtn.disabled = false;
            }
        }
        const countTip = imagesWall.querySelector('.count-tip');
        if (countTip) {
            countTip.innerText = canAddMore ? `还可添加 ${MAX_IMAGES_PER_ROOM - imageCount} 张` : `已达上限 ${MAX_IMAGES_PER_ROOM} 张`;
        }

        // 重新绑定新生成的图片备注和删除按钮事件
        attachImageEvents(roomId, imagesWall);
    }

    // 绑定图片备注输入和删除按钮（确保每次局部刷新后事件生效）
    function attachImageEvents(roomId, wallContainer) {
        // 备注输入框
        const noteTextareas = wallContainer.querySelectorAll('.note-input');
        noteTextareas.forEach(textarea => {
            const imageId = textarea.getAttribute('data-image-id');
            // 避免重复绑定，先移除旧的
            textarea.removeEventListener('input', textarea._inputHandler);
            const handler = (e) => {
                updateImageNote(roomId, imageId, e.target.value);
            };
            textarea.addEventListener('input', handler);
            textarea._inputHandler = handler;
        });

        // 删除按钮
        const delBtns = wallContainer.querySelectorAll('.del-img-btn');
        delBtns.forEach(btn => {
            const imageId = btn.getAttribute('data-image-id');
            btn.removeEventListener('click', btn._clickHandler);
            const handler = (e) => {
                e.stopPropagation();
                if (confirm("确定删除这张图片吗？")) {
                    deleteImage(roomId, imageId);
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
    }

    // 全量渲染（只在初始化、重置、导入数据时调用）
    function fullRender() {
        const container = document.getElementById("roomsContainer");
        if (!container) return;
        container.innerHTML = '';

        for (let room of ROOMS) {
            const roomId = room.id;
            const data = roomsData[roomId];
            const images = data?.images || [];
            const globalNote = data?.globalNote || '';
            const imageCount = images.length;
            const canAddMore = imageCount < MAX_IMAGES_PER_ROOM;

            const card = document.createElement("div");
            card.className = "room-card";
            card.setAttribute("data-room-id", roomId);

            // 头部
            const headerDiv = document.createElement("div");
            headerDiv.className = "room-header";
            headerDiv.innerHTML = `
                <div class="room-title">
                    <i class="fas ${room.icon}"></i>
                    <span>${room.name}</span>
                </div>
            `;
            card.appendChild(headerDiv);

            // 全局备注区域
            const globalDiv = document.createElement("div");
            globalDiv.className = "global-note-area";
            const label = document.createElement("label");
            label.innerHTML = '<i class="fas fa-pen-fancy"></i> 空间笔记 / 灵感备注';
            const textareaGlobal = document.createElement("textarea");
            textareaGlobal.className = "global-note-input";
            textareaGlobal.rows = 2;
            textareaGlobal.placeholder = "写点装修想法、配色方案、选材提醒...";
            textareaGlobal.value = globalNote;
            globalDiv.appendChild(label);
            globalDiv.appendChild(textareaGlobal);
            card.appendChild(globalDiv);

            // 图片墙
            const wallDiv = document.createElement("div");
            wallDiv.className = "images-wall";

            const imagesGrid = document.createElement("div");
            imagesGrid.className = "images-grid";
            if (images.length === 0) {
                const emptyMsg = document.createElement("div");
                emptyMsg.className = "empty-tip";
                emptyMsg.innerText = "📸 暂无图片，点击下方按钮添加设计图/实景照";
                imagesGrid.appendChild(emptyMsg);
            } else {
                images.forEach(img => {
                    const imgItem = document.createElement("div");
                    imgItem.className = "image-item";
                    imgItem.innerHTML = `
                        <img class="image-preview" src="${escapeHtml(img.src)}" alt="装修参考" loading="lazy">
                        <div class="image-note">
                            <textarea class="note-input" rows="2" placeholder="添加备注（如：材质/品牌/避坑点）" data-image-id="${img.id}">${escapeHtml(img.note)}</textarea>
                        </div>
                        <button class="del-img-btn" data-image-id="${img.id}"><i class="fas fa-trash-alt"></i> 删除图片</button>
                    `;
                    imagesGrid.appendChild(imgItem);
                });
            }
            wallDiv.appendChild(imagesGrid);

            // 添加按钮
            const addBtn = document.createElement("button");
            addBtn.className = "add-img-btn";
            if (!canAddMore) addBtn.classList.add("disabled");
            addBtn.innerHTML = `<i class="fas fa-plus-circle"></i> 添加图片 (${imageCount}/${MAX_IMAGES_PER_ROOM})`;
            if (!canAddMore) addBtn.disabled = true;

            const countTip = document.createElement("div");
            countTip.className = "count-tip";
            countTip.innerText = canAddMore ? `还可添加 ${MAX_IMAGES_PER_ROOM - imageCount} 张` : `已达上限 ${MAX_IMAGES_PER_ROOM} 张`;

            const fileInput = document.createElement("input");
            fileInput.type = "file";
            fileInput.accept = "image/*";
            fileInput.style.display = "none";

            wallDiv.appendChild(addBtn);
            wallDiv.appendChild(countTip);
            wallDiv.appendChild(fileInput);
            card.appendChild(wallDiv);

            container.appendChild(card);

            // 绑定全局备注事件
            textareaGlobal.addEventListener("input", (e) => {
                updateGlobalNote(roomId, e.target.value);
            });

            // 绑定添加图片事件
            if (canAddMore) {
                addBtn.addEventListener("click", () => fileInput.click());
                fileInput.addEventListener("change", async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        await addImageToRoom(roomId, file);
                        fileInput.value = '';
                    }
                });
            }

            // 绑定图片备注及删除事件（针对首次生成的图片）
            attachImageEvents(roomId, wallDiv);
        }
    }

    // 重置所有
    function resetAll() {
        if (confirm("⚠️ 确定要清空所有空间里的图片和备注吗？此操作不可撤销。")) {
            roomsData = initDataStruct();
            persistToLocal();
            fullRender();
        }
    }

    // 导出数据
    function exportData() {
        const dataStr = JSON.stringify(roomsData, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `home_renovation_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // 导入数据
    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (typeof imported !== "object") throw new Error();
                for (let room of ROOMS) {
                    if (!imported[room.id]) imported[room.id] = { globalNote: "", images: [] };
                    if (!imported[room.id].images) imported[room.id].images = [];
                    if (imported[room.id].images.length > MAX_IMAGES_PER_ROOM) {
                        imported[room.id].images = imported[room.id].images.slice(0, MAX_IMAGES_PER_ROOM);
                    }
                    imported[room.id].images = imported[room.id].images.map(img => ({ ...img, note: img.note || "" }));
                    if (imported[room.id].globalNote === undefined) imported[room.id].globalNote = "";
                }
                roomsData = imported;
                persistToLocal();
                fullRender();
                alert("数据导入成功！所有图片和备注已同步。");
            } catch(err) {
                alert("导入失败，请选择正确的备份文件（.json）");
            }
        };
        reader.readAsText(file);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化
    function init() {
        loadFromLocal();
        fullRender();

        document.getElementById("exportDataBtn").addEventListener("click", exportData);
        const importBtn = document.getElementById("importDataBtn");
        const importFile = document.getElementById("importFileInput");
        importBtn.addEventListener("click", () => importFile.click());
        importFile.addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
                importData(e.target.files[0]);
                importFile.value = '';
            }
        });
        document.getElementById("resetAllData").addEventListener("click", resetAll);
    }

    init();
</script>
</body>
</html>
